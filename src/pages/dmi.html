<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Mining & SPSS Modeler – Zkouškový kvíz</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #f85149;
    --gold: #e3b341;
    --text: #e6edf3;
    --muted: #8b949e;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    background: rgba(88,166,255,.1);
    border: 1px solid rgba(88,166,255,.3);
    padding: 4px 10px;
    border-radius: 4px;
    white-space: nowrap;
  }
  header h1 { font-size: 18px; font-weight: 600; flex: 1; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; }
  .progress-bar {
    width: 160px; height: 6px;
    background: var(--border);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 3px;
    transition: width .4s ease;
    width: 0%;
  }
  #progress-text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }

  /* ── Layout ── */
  .container { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ── Section headings ── */
  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin: 40px 0 20px;
  }

  /* ── Question card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 16px;
    transition: border-color .2s;
  }
  .q-card.answered { border-color: var(--border); }
  .q-card.correct  { border-color: var(--accent2); background: rgba(63,185,80,.05); }
  .q-card.wrong    { border-color: var(--warn);    background: rgba(248,81,73,.05); }

  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: var(--muted);
    margin-bottom: 6px;
  }
  .q-text { font-weight: 600; font-size: 15px; margin-bottom: 16px; }

  .options { display: grid; gap: 8px; }
  .opt {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    font-size: 14px;
  }
  .opt:hover { background: #1f2937; border-color: var(--accent); }
  .opt.selected { border-color: var(--accent); background: rgba(88,166,255,.1); }
  .opt.correct  { border-color: var(--accent2) !important; background: rgba(63,185,80,.15) !important; }
  .opt.wrong    { border-color: var(--warn)   !important; background: rgba(248,81,73,.12)  !important; }
  .opt.reveal-correct { border-color: var(--accent2) !important; background: rgba(63,185,80,.08) !important; }

  .opt-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600;
    min-width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    background: var(--border); color: var(--muted);
    flex-shrink: 0; margin-top: 1px;
  }
  .opt.selected .opt-letter { background: var(--accent); color: #000; }
  .opt.correct  .opt-letter { background: var(--accent2); color: #000; }
  .opt.wrong    .opt-letter { background: var(--warn);    color: #fff; }
  .opt.reveal-correct .opt-letter { background: var(--accent2); color: #000; }

  .feedback {
    display: none;
    margin-top: 12px;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.ok  { background: rgba(63,185,80,.12);  border-left: 3px solid var(--accent2); color: #7ee787; }
  .feedback.err { background: rgba(248,81,73,.12);  border-left: 3px solid var(--warn);    color: #ff7b72; }

  /* ── Results panel ── */
  #results {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    text-align: center;
    margin-top: 40px;
  }
  #results.show { display: block; }
  .score-big {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 64px; font-weight: 600;
    line-height: 1;
  }
  .score-big.pass { color: var(--accent2); }
  .score-big.fail { color: var(--warn); }
  .score-label { color: var(--muted); margin-top: 8px; font-size: 14px; }
  .score-msg { margin-top: 20px; font-size: 16px; font-weight: 600; }

  #results-btn {
    margin-top: 28px;
    background: var(--accent);
    color: #000;
    border: none; border-radius: 6px;
    padding: 12px 28px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  #results-btn:hover { opacity: .85; }

  /* ── Sticky submit ── */
  .submit-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(13,17,23,.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .unanswered-note { color: var(--muted); font-size: 13px; }
  #submit-btn {
    background: var(--accent2);
    color: #000;
    border: none; border-radius: 6px;
    padding: 10px 26px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s;
  }
  #submit-btn:hover { opacity: .85; }
  #submit-btn:disabled { opacity: .4; cursor: not-allowed; }

  .tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
    margin-bottom: 6px;
  }
  .tag-concept { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid rgba(88,166,255,.3); }
  .tag-modeler { background: rgba(63,185,80,.15);  color: var(--accent2); border: 1px solid rgba(63,185,80,.3); }
  .tag-algo    { background: rgba(227,179,65,.15);  color: var(--gold);   border: 1px solid rgba(227,179,65,.3); }
</style>
</head>
<body>

<header>
  <div class="logo">SPSS MODELER</div>
  <h1>Data Mining — zkouškový kvíz</h1>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <span id="progress-text">0 / 0</span>
  </div>
</header>

<div class="container" id="quiz-container">
  <!-- generated by JS -->
  <div id="results">
    <div class="score-big" id="score-big">0%</div>
    <div class="score-label" id="score-label"></div>
    <div class="score-msg" id="score-msg"></div>
    <button id="results-btn" onclick="restartQuiz()">Zkusit znovu (přemíchat pořadí)</button>
  </div>
</div>

<div class="submit-bar">
  <span class="unanswered-note" id="unanswered-note">Zodpověz všechny otázky</span>
  <button id="submit-btn" onclick="submitQuiz()" disabled>Vyhodnotit</button>
</div>

<script>
const ALL_QUESTIONS = [

/* ═══════════════ ZÁKLADNÍ POJMY ═══════════════ */
{s:"Základní pojmy DM", tag:"concept",
 q:"Co je datamining?",
 a:["Proces dolování znalostí z velkého množství dat pomocí statistických a algoritmických metod.",
    "Ruční vyhledávání informací v databázích bez použití algoritmů.",
    "Technologie pro zálohování databází v cloudovém prostředí.",
    "Výhradně vizualizační technika pro zobrazení struktury dat."],
 c:0, exp:"DM = automatizované hledání skrytých vzorů, závislostí a znalostí v datech."},

{s:"Základní pojmy DM", tag:"concept",
 q:"Co se skrývá pod zkratkou CRM?",
 a:["Customer Relationship Management – řízení vztahů se zákazníky.",
    "Core Resource Module – modul pro správu zdrojů.",
    "Centralized Record Mining – centralizované dolování záznamů.",
    "Certified Risk Model – certifikovaný model rizik."],
 c:0, exp:"CRM = Customer Relationship Management, systém pro správu vztahů se zákazníky."},

{s:"Základní pojmy DM", tag:"concept",
 q:"Jaké typy DM úloh patří typicky do portfolia CRM?",
 a:["Predikce odchodu zákazníků (churn), křížový prodej, segmentace zákazníků, skóring.",
    "Diagnóza nemocí, predikce počasí, detekce podvodů v letecké dopravě.",
    "Komprimace dat, šifrování databází, migrace dat mezi systémy.",
    "Výhradně tvorba reportů a dashboardů bez prediktivní složky."],
 c:0, exp:"CRM typicky zahrnuje churn prediction, cross-sell/upsell, segmentaci, scoringové modely."},

{s:"Základní pojmy DM", tag:"concept",
 q:"Jaké DM úlohy řeší obvykle finanční instituce?",
 a:["Detekce podvodů, hodnocení úvěrového rizika (credit scoring), předpověď defaultu.",
    "Analýza sentimentu v sociálních sítích a segmentace trhu s hudbou.",
    "Optimalizace logistických tras a predikce počasí.",
    "Výhradně predikce ceny akcií bez jiných aplikací."],
 c:0, exp:"Banky a pojišťovny: credit scoring, fraud detection, predikce defaultu, praní špinavých peněz."},

{s:"Základní pojmy DM", tag:"concept",
 q:"Je pravdivé tvrzení, že DM odhalí v datech VŠE podstatné?",
 a:["Ne – DM může přehlédnout vzory nebo produkovat falešné závislosti, výsledky závisí na kvalitě dat a volbě algoritmu.",
    "Ano – pokud algoritmus běží dostatečně dlouho, odhalí všechny skryté vzory.",
    "Ano – moderní algoritmy garantují 100% nalezení všech závislostí.",
    "Ne – DM vůbec neumí odhalovat vzory, slouží jen k vizualizaci."],
 c:0, exp:"DM má omezení: závisí na datech, výběru algoritmů, definici problému. Výsledky je nutné interpretovat."},

{s:"Základní pojmy DM", tag:"concept",
 q:"Je pravdivé tvrzení, že DM pracuje POUZE s obrovskými datovými množinami?",
 a:["Ne – DM lze aplikovat i na menší datasety, i když větší data obecně zlepšují kvalitu modelů.",
    "Ano – DM je definován minimálně milionem záznamů, jinak nejde o DM.",
    "Ano – bez big data nejsou výsledky DM statisticky relevantní.",
    "Ne – DM se používá výhradně na datasety s méně než 1000 záznamy."],
 c:0, exp:"Velikost dat není definičním znakem DM. Důležitá je relevance dat, ne jen jejich množství."},

{s:"Základní pojmy DM", tag:"concept",
 q:"Je pravdivé tvrzení, že DM JE modelování?",
 a:["Pouze zčásti – modelování je jedna fáze DM procesu, ale DM zahrnuje i přípravu dat, hodnocení a nasazení.",
    "Ano – DM a modelování jsou synonyma a označují totéž.",
    "Ne – DM a modelování jsou zcela odlišné disciplíny bez překryvu.",
    "Ano – modelování je jediná smysluplná část celého DM procesu."],
 c:0, exp:"Dle CRISP-DM je modelování jen jedna z 6 fází. DM zahrnuje datové porozumění, přípravu, nasazení atd."},

/* ═══════════════ CRISP-DM ═══════════════ */
{s:"Metodologie CRISP-DM", tag:"concept",
 q:"Kdy a proč vznikla metodologie CRISP-DM a kdo stál u jejího vzniku?",
 a:["Vznikla v roce 1996, iniciovala ji konsorcium firem SPSS, NCR, DaimlerChrysler a OHRA – potřeba standardního procesu pro DM projekty.",
    "Vznikla v roce 2005, vytvořila ji výhradně IBM jako interní metodiku pro SPSS.",
    "Vznikla v roce 1980 jako akademický standard MIT pro statistickou analýzu.",
    "Vznikla v roce 2010, iniciovala ji Google jako framework pro machine learning projekty."],
 c:0, exp:"CRISP-DM 1.0 byl vydán v roce 1999 (projekt startoval ~1996). Zakladatelé: SPSS, NCR, DaimlerChrysler, OHRA."},

{s:"Metodologie CRISP-DM", tag:"concept",
 q:"Která z možností SPRÁVNĚ vyjmenovává 6 fází CRISP-DM?",
 a:["Business Understanding → Data Understanding → Data Preparation → Modeling → Evaluation → Deployment",
    "Data Collection → Cleaning → Visualization → Modeling → Testing → Production",
    "Problem Definition → ETL → Statistics → ML → Validation → Reporting",
    "Requirements → Design → Development → Testing → Deployment → Maintenance"],
 c:0, exp:"6 fází CRISP-DM: Business Understanding, Data Understanding, Data Preparation, Modeling, Evaluation, Deployment."},

{s:"Metodologie CRISP-DM", tag:"concept",
 q:"Co řeší fáze 'Business Understanding' v CRISP-DM?",
 a:["Definice cílů projektu z pohledu byznysu, převod na DM úlohu, plán projektu.",
    "Strojové učení modelů a ladění hyperparametrů.",
    "Čištění a transformace dat pro modelování.",
    "Nasazení finálního modelu do produkčního prostředí."],
 c:0, exp:"Business Understanding: co chceme dosáhnout z pohledu byznysu, jaká je DM úloha, jaká jsou kritéria úspěchu."},

{s:"Metodologie CRISP-DM", tag:"concept",
 q:"Co řeší fáze 'Data Preparation' v CRISP-DM?",
 a:["Čištění dat, tvorba nových proměnných, výběr relevantních atributů, formátování pro modelování.",
    "Trénování a ladění finálních prediktivních modelů.",
    "Nasazení modelu do produkce a monitoring výsledků.",
    "Statistická analýza výsledků modelu a tvorba závěrečné zprávy."],
 c:0, exp:"Data Preparation: čistění, transformace, odvozené proměnné, výběr záznamů – příprava pro modelovací fázi."},

{s:"Metodologie CRISP-DM", tag:"concept",
 q:"Jaký je základní rozdíl mezi dataminingem a statistikou?",
 a:["DM je primárně zaměřen na predikci a hledání vzorů (explorativní), statistika na testování hypotéz a kauzalitu.",
    "Statistika pracuje s daty, DM pouze s textem a obrázky.",
    "DM a statistika jsou totéž – liší se jen název.",
    "Statistika je automatizovaná, DM vyžaduje ruční analýzu každého záznamu."],
 c:0, exp:"DM: discovery-driven, prediktivní, velká data. Statistika: hypotézy, kauzalita, matematické odvozování."},

/* ═══════════════ PROMĚNNÉ ═══════════════ */
{s:"Typy proměnných a úloh", tag:"concept",
 q:"Co je vstupní proměnná (prediktor, nezávislá proměnná)?",
 a:["Proměnná, která vstupuje do modelu jako vstup a slouží k předpovídání výstupní proměnné.",
    "Proměnná, kterou se model snaží předpovědět (cíl).",
    "Proměnná obsahující ID záznamu bez analytické hodnoty.",
    "Proměnná, která se generuje automaticky jako výstup algoritmu."],
 c:0, exp:"Prediktor = input field = nezávislá proměnná – to, co vkládáme do modelu jako vstup."},

{s:"Typy proměnných a úloh", tag:"concept",
 q:"Co je výstupní/cílová proměnná (target field)?",
 a:["Proměnná, kterou se model snaží předpovědět nebo vysvětlit.",
    "Proměnná obsahující výsledky transformací a agregací vstupních dat.",
    "Libovolná vstupní proměnná vybraná analytikem jako hlavní.",
    "Proměnná generovaná v uzlu Type jako sekundární výstup."],
 c:0, exp:"Target field = cílová proměnná = dependent variable – to, co chceme predikovat."},

{s:"Typy proměnných a úloh", tag:"concept",
 q:"Jaký je rozdíl mezi klasifikační a regresní úlohou?",
 a:["Klasifikace předpovídá kategoriální třídu (např. ano/ne), regrese předpovídá číselnou hodnotu (např. cena).",
    "Regrese třídí záznamy do skupin, klasifikace předpovídá čísla.",
    "Klasifikace pracuje pouze s textovými daty, regrese pouze s časovými řadami.",
    "Oba typy jsou totožné, liší se pouze názvem v různých programovacích jazycích."],
 c:0, exp:"Klasifikace → diskrétní kategorie (churn: ano/ne). Regrese → spojitá číselná hodnota (cena, příjem)."},

{s:"Typy proměnných a úloh", tag:"concept",
 q:"Jakého typu je cílová proměnná u regresní úlohy?",
 a:["Spojitá číselná proměnná (scale/continuous).",
    "Binární proměnná s hodnotami 0 a 1.",
    "Nominální kategoriální proměnná.",
    "Ordinální proměnná s omezeným počtem pořadí."],
 c:0, exp:"Regrese: target = scale/continuous. Klasifikace: target = nominal/flag (kategorie)."},

{s:"Typy proměnných a úloh", tag:"concept",
 q:"Jaký je rozdíl mezi strojovým učením BEZ UČITELE a UČENÍM S UČITELEM?",
 a:["Učení s učitelem má cílovou proměnnou (labeled data), učení bez učitele nemá – hledá vzory samo.",
    "Učení bez učitele potřebuje experta, který opravuje každý výsledek; s učitelem běží automaticky.",
    "Učení s učitelem funguje pouze na číselných datech, bez učitele pouze na textu.",
    "Učení bez učitele je rychlejší, protože používá méně dat; s učitelem potřebuje miliony záznamů."],
 c:0, exp:"Supervised = labeled data + target field (klasifikace, regrese). Unsupervised = no labels (clustering, AR)."},

{s:"Typy proměnných a úloh", tag:"concept",
 q:"Co je klasifikace? Uveďte příklad úlohy a vhodný algoritmus.",
 a:["Přiřazení záznamu do předem definované kategorie; příklad: predikce odchodu zákazníka (ano/ne), algoritmus: C&RT, C5.0.",
    "Predikce číselné hodnoty; příklad: odhad příjmu zákazníka, algoritmus: lineární regrese.",
    "Seskupení podobných záznamů; příklad: segmentace zákazníků, algoritmus: K-Means.",
    "Hledání pravidel 'pokud-pak'; příklad: analýza nákupního košíku, algoritmus: Apriori."],
 c:0, exp:"Klasifikace = supervised, diskrétní target. Vhodné algos: C&RT, C5.0, CHAID, Logistická regrese."},

{s:"Typy proměnných a úloh", tag:"concept",
 q:"Co je seskupování (clustering)? Příklad úlohy a algoritmus.",
 a:["Rozdělení dat do skupin podobných objektů bez předem dané třídy; příklad: segmentace zákazníků, algoritmus: K-Means.",
    "Přiřazení záznamu do předem definované kategorie; příklad: spam/ne-spam, algoritmus: C5.0.",
    "Predikce spojité hodnoty; příklad: odhad ceny nemovitosti, algoritmus: lineární regrese.",
    "Hledání vztahů mezi položkami v transakcích; příklad: analýza košíku, algoritmus: Apriori."],
 c:0, exp:"Clustering = unsupervised. K-Means, Two Step, Kohonen. Výstup: přiřazení do shluku (cluster ID)."},

/* ═══════════════ SPSS MODELER – UZLY ═══════════════ */
{s:"SPSS Modeler – uzly", tag:"modeler",
 q:"K čemu slouží uzel TYPE v SPSS Modeler?",
 a:["Definuje role a měrné úrovně proměnných (input/target/ID, nominal/scale/flag...).",
    "Importuje data ze souborů různých typů (CSV, Excel, SAV).",
    "Rozděluje datovou množinu na trénovací a testovací část.",
    "Transformuje číselné proměnné na kategoriální pomocí binningu."],
 c:0, exp:"Type uzel: nastavení role (Input/Target/Both/None/ID) a storage/measurement level."},

{s:"SPSS Modeler – uzly", tag:"modeler",
 q:"K čemu slouží uzel PARTITION?",
 a:["Rozděluje datovou sadu na trénovací, testovací (a volitelně validační) podmnožinu.",
    "Filtruje záznamy podle zadané podmínky (např. věk > 30).",
    "Sloučí dva datové toky horizontálně (přidání sloupců).",
    "Agreguje záznamy a počítá průměry nebo součty."],
 c:0, exp:"Partition: přidá sloupec s rozdělením na Train/Test/(Validation). Nastavuje se jako %)."},

{s:"SPSS Modeler – uzly", tag:"modeler",
 q:"K čemu slouží uzel BALANCE?",
 a:["Vyrovná rozložení cílové proměnné – zvýší zastoupení minoritní třídy (oversampling/undersampling).",

// ── Shuffle helper ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Build quiz ──
let questions = [];
let answered  = 0;

function buildQuiz() {
  questions = ALL_QUESTIONS.map(q => {
    // Shuffle options and track new correct index
    const indices = [0, 1, 2, 3];
    shuffle(indices);
    const newAnswers = indices.map(i => q.a[i]);
    const newCorrect = indices.indexOf(q.c);
    return { ...q, a: newAnswers, c: newCorrect, _orig: q };
  });

  // Group by section
  const sections = {};
  questions.forEach((q, i) => {
    if (!sections[q.s]) sections[q.s] = [];
    sections[q.s].push({ q, idx: i });
  });

  const container = document.getElementById('quiz-container');
  const resultsEl = document.getElementById('results');

  // Clear old content (keep results div)
  Array.from(container.children).forEach(c => {
    if (c.id !== 'results') c.remove();
  });

  answered = 0;
  updateProgress();

  Object.entries(sections).forEach(([secName, items]) => {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="section-title">${secName}</div>`;
    items.forEach(({ q, idx }) => {
      sec.appendChild(buildCard(q, idx));
    });
    container.insertBefore(sec, resultsEl);
  });

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('unanswered-note').textContent = `Zodpověz všechny otázky (0 / ${questions.length})`;
  resultsEl.classList.remove('show');
  updateProgress();
}

const LETTERS = ['A', 'B', 'C', 'D'];

function buildCard(q, idx) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `q-${idx}`;
  const tagClass = q.tag === 'modeler' ? 'tag-modeler' : q.tag === 'algo' ? 'tag-algo' : 'tag-concept';
  const tagLabel = q.tag === 'modeler' ? 'MODELER' : q.tag === 'algo' ? 'ALGORITMY' : 'POJMY';
  card.innerHTML = `
    <div class="q-num">
      <span class="tag ${tagClass}">${tagLabel}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts-${idx}">
      ${q.a.map((ans, ai) => `
        <div class="opt" id="opt-${idx}-${ai}" onclick="selectOpt(${idx},${ai})">
          <span class="opt-letter">${LETTERS[ai]}</span>
          <span>${ans}</span>
        </div>
      `).join('')}
    </div>
    <div class="feedback" id="fb-${idx}"></div>
  `;
  return card;
}

function selectOpt(qIdx, optIdx) {
  const q = questions[qIdx];
  if (q._answered) return;

  // Deselect previous
  q.a.forEach((_, ai) => {
    document.getElementById(`opt-${qIdx}-${ai}`).classList.remove('selected');
  });
  document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('selected');
  q._selected = optIdx;

  if (!q._answered) {
    answered++;
    q._answered = true;
    updateProgress();
    checkSubmit();
  }
}

function updateProgress() {
  const total = questions.length;
  const pct = total > 0 ? (answered / total * 100) : 0;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${answered} / ${total}`;
  document.getElementById('unanswered-note').textContent =
    answered === total
      ? 'Všechny otázky zodpovězeny ✓'
      : `Zodpověz všechny otázky (${answered} / ${total})`;
}

function checkSubmit() {
  const allDone = questions.every(q => q._answered !== undefined);
  document.getElementById('submit-btn').disabled = !allDone;
}

function submitQuiz() {
  let correct = 0;
  questions.forEach((q, idx) => {
    const sel = q._selected;
    const card = document.getElementById(`q-${idx}`);
    const fb   = document.getElementById(`fb-${idx}`);

    // Mark options
    q.a.forEach((_, ai) => {
      const opt = document.getElementById(`opt-${idx}-${ai}`);
      opt.style.cursor = 'default';
      if (ai === q.c) opt.classList.add('reveal-correct');
    });

    const selOpt = document.getElementById(`opt-${idx}-${sel}`);
    if (sel === q.c) {
      correct++;
      selOpt.classList.add('correct');
      selOpt.classList.remove('reveal-correct');
      card.classList.add('correct');
      fb.className = 'feedback ok show';
      fb.textContent = '✓ Správně! ' + (q.exp || '');
    } else {
      selOpt.classList.add('wrong');
      card.classList.add('wrong');
      fb.className = 'feedback err show';
      fb.textContent = '✗ Špatně. ' + (q.exp || '');
    }
  });

  const total = questions.length;
  const pct = Math.round(correct / total * 100);
  const resultsEl = document.getElementById('results');
  const scoreBig  = document.getElementById('score-big');
  const scoreLabel= document.getElementById('score-label');
  const scoreMsg  = document.getElementById('score-msg');

  scoreBig.textContent = pct + '%';
  scoreLabel.textContent = `${correct} správně z ${total} otázek`;

  if (pct >= 75) {
    scoreBig.className = 'score-big pass';
    scoreMsg.textContent = pct >= 90
      ? '🏆 Výborně! Jsi připraven na test.'
      : '✅ Dobrý výsledek! Ještě trochu zopakuj a projdeš.';
  } else {
    scoreBig.className = 'score-big fail';
    scoreMsg.textContent = pct >= 50
      ? '⚠️ Taktak. Zaměř se na červeně označené otázky.'
      : '❌ Potřebuješ ještě procvičit. Zkus to znovu!';
  }

  resultsEl.classList.add('show');
  document.getElementById('submit-btn').disabled = true;
  resultsEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartQuiz() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(buildQuiz, 300);
}

// Start
buildQuiz();
</script>
